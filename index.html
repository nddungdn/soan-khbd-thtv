                  contents: [{
                      parts: [
                          { text: "Hãy đọc và trích xuất nguyên văn toàn bộ nội dung chữ trong bức ảnh này. Giữ nguyên cấu trúc đoạn văn, tiêu đề. Chỉ trả về kết quả văn bản, tuyệt đối không thêm bình luận hay giải thích." },
                          { inlineData: { mimeType: mimeType, data: base64Data } }
                      ]
                  }]
              };

              const response = await fetch(apiUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
              });

              const data = await response.json();
              if (!response.ok) throw new Error(data.error?.message || 'Lỗi kết nối AI đọc ảnh (Thầy cần điền API Key vào code)');
              
              const extractedText = data.candidates[0].content.parts[0].text;
              
              setterFunc(prev => isAppendMode ? prev + (prev ? '\n\n--- Hết trang trước, tiếp tục trang mới ---\n\n' : '') + extractedText : extractedText);
            } catch (err) {
              showToast(`Lỗi nhận diện ảnh: ${err.message}`);
            }
          } else {
            showToast(`Bỏ qua file ${file.name}: Không hỗ trợ định dạng này.`);
          }
        }
        
        showToast(`Đã xử lý xong ${files.length} file!`);
        setIsLoading(false);
        event.target.value = ''; 
      };

      const renderMarkdown = (text) => {
        if (typeof marked !== 'undefined') {
          return { __html: marked.parse(text, { breaks: true }) };
        }
        return { __html: text.replace(/\n/g, '<br/>') };
      };

      const handleCopy = (text) => {
        document.execCommand('copy');
        navigator.clipboard.writeText(text).then(() => {
          showToast('Đã sao chép vào bộ nhớ đệm!');
        }).catch(() => {
          showToast('Lỗi sao chép, vui lòng thao tác thủ công.');
        });
      };

      const handleExportWord = (htmlString, index) => {
        let processedHtml = htmlString
          .replace(/<td(.*?)>/gi, '<td$1><p>')
          .replace(/<\/td>/gi, '</p></td>')
          .replace(/<th(.*?)>/gi, '<th$1><p>')
          .replace(/<\/th>/gi, '</p></th>')
          .replace(/<br\s*\/?>/gi, '</p><p>');

        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title>Giáo Án</title>
        <style>
          @page { size: A4; margin: 2cm; }
          body { font-family: 'Times New Roman', serif; font-size: 14pt; text-align: justify; }
          table { border-collapse: collapse; width: 100%; margin-bottom: 15pt; }
          th, td { border: 1px solid black; padding: 8pt; vertical-align: top; text-align: justify; }
          th { font-weight: bold; text-align: center; }
          p { margin: 0 0 6pt 0; text-align: justify; line-height: 1.3; }
        </style>
        </head><body>`;
        const footer = "</body></html>";
        const sourceHTML = header + processedHtml + footer;
        
        const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
        const fileDownload = document.createElement("a");
        document.body.appendChild(fileDownload);
        fileDownload.href = source;
        fileDownload.download = `Giao_An_AI_Phien_Ban_${index}.doc`;
        fileDownload.click();
        document.body.removeChild(fileDownload);
        
        showToast('Đã xuất file Word định dạng chuẩn!');
      };

      const handleSendMessage = async (customText) => {
        const textToSend = typeof customText === 'string' ? customText : inputValue;
        if (!textToSend.trim()) return;

        if (!contextTextbook.trim() && textToSend.includes("hoàn chỉnh")) {
            showToast('LỖI: CHƯA CUNG CẤP DỮ LIỆU SÁCH GIÁO KHOA!');
            return;
        }

        if (typeof customText !== 'string') {
           setInputValue(''); 
        }
        
        const newMessages = [...messages, { role: 'user', text: textToSend }];
        setMessages(newMessages);
        setIsLoading(true);
        
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${apiKey}`;

        const systemInstructionText = `Bạn là một chuyên gia soạn giáo án siêu việt, có tư duy sư phạm hiện đại. 
QUY TẮC TỐI THƯỢNG VÀ BẮT BUỘC PHẢI TUÂN THỦ:
1. KHÔNG BAO GIỜ chào hỏi, KHÔNG dạ vâng, KHÔNG giải thích. Chỉ in ra trực tiếp nội dung giáo án thành phẩm.
2. Tự phân tích "Nội dung Sách Giáo Khoa" để lấp đầy toàn bộ thông tin kiến thức vào giáo án. KHÔNG để lại chữ [Cần thông tin từ người dùng].
3. QUY TẮC IN ĐẬM (BẮT BUỘC):
   - Phải in đậm các mục lớn và tên mục: **A. MỤC TIÊU BÀI HỌC**, **B. PHƯƠNG PHÁP TRỌNG TÂM**, **C. CHUẨN BỊ...**, **D. TIẾN TRÌNH DẠY HỌC**, **I.**, **II.**, **III.**...
   - Phải in đậm tên hoạt động: **HOẠT ĐỘNG [Số]: [Tên hoạt động]**
   - Phải in đậm các bước: **Bước 1:**, **Bước 2:**, **Bước 3:**, **Bước 4:**
   - Phải in đậm các mục nhỏ trong hoạt động: **- Thời gian:**, **- Mục tiêu:**, **- Sản phẩm dự kiến:**, **- Tổ chức thực hiện:**
4. QUY TẮC TẠO BẢNG TIẾN TRÌNH DẠY HỌC (BẮT BUỘC):
   - Bảng gồm đúng 2 cột: "TỔ CHỨC HOẠT ĐỘNG" và "YÊU CẦU CẦN ĐẠT".
   - ĐỂ XUỐNG DÒNG BÊN TRONG Ô CỦA BẢNG, BẠN BẮT BUỘC PHẢI DÙNG THẺ <br>. TUYỆT ĐỐI KHÔNG BẤM ENTER XUỐNG DÒNG BÊN TRONG BẢNG VÌ SẼ LÀM VỠ CẤU TRÚC BẢNG.
   - Ví dụ đúng: | **HOẠT ĐỘNG 1: KHỞI ĐỘNG** <br> **- Mục tiêu:** ... <br> **Bước 1:** ... |
5. Ở cột "YÊU CẦU CẦN ĐẠT", BẮT BUỘC phải ghi chi tiết NỘI DUNG GHI BẢNG (khái niệm, đặc điểm, công dụng, ĐÁP ÁN CHI TIẾT bài tập). Tuyệt đối không ghi chung chung.
6. Hãy lồng ghép đa dạng các phương pháp sư phạm: Trò chơi học tập, Thảo luận nhóm, Kĩ thuật khăn trải bàn, Kĩ thuật mảnh ghép, Sắm vai... để lớp học sinh động.

TÀI LIỆU THAM CHIẾU:
--- CẤU TRÚC BẮT BUỘC ---
${contextStructure}

--- GIÁO ÁN MẪU ---
${contextSample}

--- NỘI DUNG SGK CẦN SOẠN ---
${contextTextbook}`;

        const apiContents = newMessages.map(msg => ({
            role: msg.role === 'user' ? 'user' : 'model',
            parts: [{ text: msg.text }]
        }));

        const requestPayload = {
            system_instruction: { parts: [{ text: systemInstructionText }] },
            contents: apiContents,
            generationConfig: { temperature: parseFloat(temperature) }
        };

        try {
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestPayload)
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error?.message || 'Kết nối máy chủ thất bại. API Key không hợp lệ hoặc chưa được cấu hình.');
          }
          
          if (data.candidates && data.candidates[0].finishReason === 'SAFETY') {
            throw new Error("Tường lửa an toàn đã chặn nội dung này.");
          }

          if (!data.candidates || !data.candidates[0].content) {
            throw new Error("Lỗi luồng dữ liệu, vui lòng đổi Mô hình xử lý.");
          }
          
          const aiResponseText = data.candidates[0].content.parts[0].text;
          setMessages(prev => [...prev, { role: 'model', text: aiResponseText }]);
          
        } catch (error) {
          console.error("Error:", error);
          setMessages(prev => [...prev, { role: 'model', text: `[LỖI HỆ THỐNG]: ${error.message}`, isError: true }]);
        } finally {
          setIsLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSendMessage();
        }
      };

      const getTempDescription = (val) => {
        if (val <= 0.3) return "Nghiêm túc, ít trò chơi, bám sát văn bản.";
        if (val <= 0.6) return "Cân bằng, có lồng ghép thảo luận nhóm, trò chơi nhẹ nhàng.";
        return "Đột phá, thiết kế nhiều hoạt động sắm vai, dự án lớp học sôi nổi.";
      };

      return (
        <React.Fragment>
          <div className="header">
            <h1>👩‍🏫 TRỢ LÝ SOẠN GIÁO ÁN AI - CYBER MODE</h1>
            <p style={{color: 'var(--text-secondary)', fontSize: '0.875rem', marginTop: '0.25rem'}}>
              Tính năng mới: Hỗ trợ Tải File Ảnh (.JPG/.PNG) quét trực tiếp nội dung Sách Giáo Khoa bằng AI Vision.
            </p>
            <button className="fullscreen-btn" onClick={toggleFullscreen} title={isFullscreen ? "Thu nhỏ màn hình" : "Toàn màn hình"}>
              {isFullscreen ? <MinimizeIcon /> : <MaximizeIcon />}
              <span>{isFullscreen ? "Thu Nhỏ" : "Toàn Màn Hình"}</span>
            </button>
          </div>

          <div className="main-container">
            <div className="config-panel">
              <h2>1. BẢNG ĐIỀU KHIỂN</h2>
              
              <div className="slider-container">
                <div className="slider-header">
                  <label>Mức độ sáng tạo</label>
                  <span className="val">{temperature}</span>
                </div>
                <input 
                  type="range" min="0" max="2" step="0.1" 
                  value={temperature} onChange={(e) => setTemperature(e.target.value)} 
                  className="temp-slider"
                />
                <div className="temp-desc">{getTempDescription(temperature)}</div>
              </div>

              <div className="slider-container" style={{marginBottom: '1.25rem'}}>
                <div className="slider-header">
                  <label>Lõi xử lý AI (Core)</label>
                </div>
                <select 
                  value={aiModel} 
                  onChange={(e) => setAiModel(e.target.value)}
                  className="model-select"
                >
                  <option value="gemini-2.5-flash">Gemini 2.5 Flash (Tốc độ cao & Hỗ trợ Ảnh)</option>
                  <option value="gemini-2.5-pro">Gemini 2.5 Pro (Tư duy sâu & Hỗ trợ Ảnh)</option>
                </select>
              </div>

              <div className="input-group">
                <div className="label-header">
                  <label>CẤU TRÚC FRAMEWORK</label>
                  <label className="upload-btn">
                    <UploadIcon /> NHẬP FILE
                    <input type="file" accept=".txt,.docx" style={{display: 'none'}} onChange={(e) => handleFileUpload(e, setContextStructure, false)} />
                  </label>
                </div>
                <textarea value={contextStructure} onChange={(e)=>setContextStructure(e.target.value)} />
              </div>
              
              <div className="input-group">
                <div className="label-header">
                  <label>DỮ LIỆU HUẤN LUYỆN (MẪU)</label>
                  <label className="upload-btn">
                    <UploadIcon /> NHẬP FILE
                    <input type="file" accept=".txt,.docx" style={{display: 'none'}} onChange={(e) => handleFileUpload(e, setContextSample, false)} />
                  </label>
                </div>
                <textarea value={contextSample} onChange={(e)=>setContextSample(e.target.value)} />
              </div>
              
              <div className="input-group" style={{ marginBottom: '1.5rem' }}>
                <div className="label-header">
                  <label>NGUỒN SÁCH GIÁO KHOA</label>
                  <label className="upload-btn" title="Hỗ trợ tải lên ảnh chụp SGK (.jpg, .png) để AI quét chữ">
                    <CameraIcon /> TẢI ẢNH / DOC
                    <input type="file" multiple accept=".txt,.docx,image/*" style={{display: 'none'}} onChange={(e) => handleFileUpload(e, setContextTextbook, true)} />
                  </label>
                </div>
                <textarea 
                  value={contextTextbook} 
                  onChange={(e)=>setContextTextbook(e.target.value)} 
                  placeholder="Dán nội dung SGK, hoặc tải ảnh chụp trang sách lên để AI tự động trích xuất chữ và nối vào đây..." 
                  style={{borderColor: contextTextbook.trim() ? 'var(--border-dim)' : 'var(--accent-primary)'}}
                />
              </div>

              <button 
                className="btn-start" 
                onClick={() => handleSendMessage("Dựa vào chỉ thị hệ thống và nội dung sách giáo khoa đã cung cấp, hãy soạn một giáo án hoàn chỉnh cho bài học này.")}
                disabled={isLoading}
              >
                <SparklesIcon /> KHỞI TẠO TIẾN TRÌNH
              </button>
            </div>

            <div className="chat-panel">
              <div className="chat-history">
                {messages.length === 0 && (
                  <div style={{margin: 'auto', textAlign: 'center', color: 'var(--text-secondary)'}}>
                    <div style={{marginBottom: '1rem', display: 'flex', justifyContent: 'center'}}>
                      <SparklesIcon />
                    </div>
                    <p style={{fontSize: '1.25rem', marginBottom: '0.5rem', color: 'var(--text-primary)', fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '1px'}}>HỆ THỐNG ĐÃ SẴN SÀNG</p>
                    <p>Vui lòng nhập liệu hoặc <b>Tải ảnh chụp Sách giáo khoa</b> để bắt đầu.</p>
                  </div>
                )}
                
                {messages.map((msg, index) => {
                  const htmlContent = msg.role === 'model' && !msg.isError ? renderMarkdown(msg.text) : {__html: msg.text.replace(/\n/g, '<br/>')};
                  const msgClass = `message ${msg.role} ${msg.isError ? 'error' : ''}`;
                  
                  return (
                    <div key={index} className={msgClass}>
                      <div className="message-content" dangerouslySetInnerHTML={htmlContent}></div>
                      
                      {msg.role === 'model' && !msg.isError && (
                        <div className="msg-actions">
                          <button className="action-btn" onClick={() => handleCopy(msg.text)} title="Sao chép văn bản">
                            <CopyIcon /> COPY
                          </button>
                          <button className="action-btn" onClick={() => {
                            const renderedHTML = renderMarkdown(msg.text).__html;
                            handleExportWord(renderedHTML, index);
                          }} title="Lưu thành file Word (.doc)">
                            <WordIcon /> EXPORT WORD
                          </button>
                        </div>
                      )}
                    </div>
                  )
                })}
                
                {isLoading && (
                  <div className="typing-indicator">
                    <div className="dot"></div><div className="dot"></div><div className="dot"></div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              <div className="chat-input-container">
                <div className="chat-input-wrapper">
                  <textarea 
                    placeholder="[TERMINAL] Nhập lệnh tinh chỉnh (VD: Đổi phương pháp trò chơi, viết chi tiết đáp án...)"
                    value={inputValue}
                    onChange={(e) => setInputValue(e.target.value)}
                    onKeyDown={handleKeyDown}
                    disabled={isLoading}
                  />
                  <button className="send-btn" onClick={handleSendMessage} disabled={isLoading || !inputValue.trim()}>
                    <SendIcon />
                  </button>
                </div>
              </div>
            </div>
          </div>
          {toastMsg && <div className="toast">{toastMsg}</div>}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</div>
