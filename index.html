<div id="ai-lesson-planner-wrapper">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
    
    /* TOÀN BỘ CSS ĐƯỢC CÁCH LY BẰNG TIỀN TỐ .ai-lp- ĐỂ TRÁNH XUNG ĐỘT BLOGGER */
    #ai-lesson-planner-wrapper {
      --bg-dark: #003f88; 
      --bg-header: #003572;
      --border-color: #ffd700; 
      --text-primary: #ffffff; 
      --text-secondary: #cccccc; 
      --text-muted: #b0c4de; 
      --accent-primary: #ffd700; 
      
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Be Vietnam Pro', sans-serif;
      box-sizing: border-box; 
      width: 100%;
      height: 90vh; 
      min-height: 750px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      margin: 10px 0;
      display: flex; 
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #ai-lesson-planner-wrapper:fullscreen {
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      border: none;
      margin: 0;
    }
    
    #ai-lesson-planner-wrapper *, #ai-lesson-planner-wrapper *:before, #ai-lesson-planner-wrapper *:after {
      box-sizing: inherit;
    }
    
    .ai-lp-header { 
      padding: 25px 20px; 
      text-align: center; 
      border-bottom: 2px solid var(--border-color); 
      background-color: var(--bg-header);
      flex-shrink: 0; 
      width: 100%;
      display: flex; 
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    
    .ai-lp-header h1 { 
      color: var(--accent-primary); 
      font-size: 1.5rem; 
      font-weight: 700;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      line-height: 1.2;
    }

    .ai-lp-header .ai-lp-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0 0 8px 0;
      line-height: 1.5;
      max-width: 850px;
    }

    .ai-lp-header .ai-lp-features-note {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin: 0 0 15px 0;
      font-style: italic;
    }

    .ai-lp-fullscreen-btn {
      background-color: transparent;
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 auto;
    }
    
    .ai-lp-main-container { 
      display: flex; 
      flex: 1; 
      overflow: hidden; 
      width: 100%; 
      background-color: var(--bg-dark);
      position: relative;
      z-index: 1;
    }
    
    .ai-lp-config-panel { 
      width: 360px; 
      background-color: rgba(0, 0, 0, 0.2); 
      border-right: 1px solid var(--border-color); 
      display: flex; 
      flex-direction: column; 
      overflow-y: auto; 
      padding: 20px; 
      flex-shrink: 0;
    }

    .ai-lp-chat-panel { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      background-color: transparent;
      min-width: 0;
    }

    .ai-lp-config-panel h2 { font-size: 1rem; margin: 0 0 20px 0; color: var(--accent-primary); text-transform: uppercase; border-left: 4px solid var(--accent-primary); padding-left: 12px; }
    .ai-lp-input-group { margin-bottom: 20px; }
    
    .ai-lp-label-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ai-lp-label-header label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; margin: 0; text-transform: uppercase;}
    
    .ai-lp-upload-btn { 
      display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; 
      color: var(--accent-primary); 
      background-color: rgba(255, 215, 0, 0.1); 
      padding: 4px 8px; 
      border-radius: 4px; 
      cursor: pointer; 
      border: 1px solid var(--border-dim);
    }
    .ai-lp-upload-btn:hover { background-color: var(--accent-primary); color: #000; }

    .ai-lp-input-group textarea, 
    .ai-lp-input-group input,
    .ai-lp-input-group select { 
      width: 100%; 
      background-color: rgba(0, 0, 0, 0.3); 
      border: 1px solid rgba(255, 215, 0, 0.2); 
      border-radius: 4px; 
      padding: 12px; 
      color: #fff; 
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      resize: vertical;
    }

    .ai-lp-btn-start { 
      background-color: var(--accent-primary); 
      color: #000; 
      border: none; 
      padding: 15px; 
      border-radius: 4px; 
      font-weight: 700; 
      cursor: pointer; 
      width: 100%; 
      text-transform: uppercase;
      margin-top: 10px;
      display: flex; justify-content: center; align-items: center; gap: 8px;
    }

    .ai-lp-chat-history { 
      flex: 1; 
      overflow-y: auto; 
      padding: 25px; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }
    
    .ai-lp-message { max-width: 90%; line-height: 1.7; }
    .ai-lp-message.user { align-self: flex-end; background: rgba(255, 215, 0, 0.15); padding: 15px 20px; border-radius: 12px; border-bottom-right-radius: 0; border: 1px solid var(--border-dim); }
    .ai-lp-message.model { align-self: flex-start; width: 100%; }
    .ai-lp-message-content { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 12px; border-bottom-left-radius: 0; border: 1px solid rgba(255,255,255,0.1); }
    
    .ai-lp-message-content table { border-collapse: collapse; width: 100%; margin: 15px 0; border: 1px solid var(--border-color); }
    .ai-lp-message-content th, .ai-lp-message-content td { border: 1px solid var(--border-dim); padding: 12px; text-align: left; font-size: 0.95rem; }
    .ai-lp-message-content th { background: rgba(255, 215, 0, 0.2); color: var(--accent-primary); }

    .ai-lp-msg-actions { margin-top: 12px; display: flex; gap: 12px; }
    .ai-lp-action-btn { font-size: 0.75rem; padding: 6px 15px; border: 1px solid var(--border-dim); background: none; color: var(--accent-primary); cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    .ai-lp-action-btn:hover { background: var(--accent-primary); color: #000; }

    .ai-lp-chat-input-container { padding: 25px; background: var(--bg-header); border-top: 1px solid var(--border-color); }
    .ai-lp-chat-input-wrapper { display: flex; gap: 12px; position: relative; max-width: 1000px; margin: 0 auto;}
    .ai-lp-chat-input-wrapper input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-dim); color: #fff; padding: 15px; border-radius: 4px; outline: none; }
    
    .ai-lp-toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--accent-primary); color: #000; padding: 12px 25px; border-radius: 6px;
      font-size: 0.9rem; font-weight: 700; z-index: 9999; animation: ai-lp-fade 3s forwards;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }
    @keyframes ai-lp-fade { 0% {opacity: 0; transform: translate(-50%, 20px);} 15% {opacity: 1; transform: translate(-50%, 0);} 85% {opacity: 1; transform: translate(-50%, 0);} 100% {opacity: 0; transform: translate(-50%, -20px);} }

    @media (max-width: 768px) {
      .ai-lp-main-container { flex-direction: column; }
      .ai-lp-config-panel { width: 100%; height: 400px; border-right: none; border-bottom: 1px solid var(--border-color); }
      .ai-lp-header h1 { font-size: 1.2rem; }
    }
  </style>

  <div id="ai-lp-root" style="height: 100%; display: flex; flex-direction: column;"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const defaultStructure = `Tuần: .... Ngày soạn: ....
Tiết PPCT: .... Ngày dạy: ....
TÊN BÀI HỌC: [TÊN BÀI HỌC]

**A. MỤC TIÊU BÀI HỌC**
1. Kiến thức
2. Năng lực
2.1. Năng lực đặc thù
2.2. Năng lực chung
3. Phẩm chất

**B. PHƯƠNG PHÁP TRỌNG TÂM**

**C. CHUẨN BỊ CỦA GIÁO VIÊN VÀ HỌC SINH**

**D. TIẾN TRÌNH DẠY HỌC**
| TỔ CHỨC HOẠT ĐỘNG | YÊU CẦU CẦN ĐẠT (NỘI DUNG GHI BẢNG) |
|---|---|
| **HOẠT ĐỘNG 1: KHỞI ĐỘNG** <br> **- Thời gian:** <br> **- Mục tiêu:** <br> **- Tổ chức thực hiện:** <br> **Bước 1:** Chuyển giao nhiệm vụ <br> **Bước 2:** Thực hiện nhiệm vụ <br> **Bước 3:** Báo cáo kết quả <br> **Bước 4:** Đánh giá kết quả | |`;

    const defaultSample = `BÀI MẪU THAM KHẢO: THỰC HÀNH TIẾNG VIỆT
**A. MỤC TIÊU BÀI HỌC**
1. Kiến thức: Tri thức về đặc điểm và tác dụng của thán từ.
2. Năng lực: Giao tiếp, hợp tác, tự học.
3. Phẩm chất: Tích cực, sôi nổi.
**B. PHƯƠNG PHÁP TRỌNG TÂM:** Trò chơi, Thảo luận nhóm.
**C. CHUẨN BỊ:** GV chuẩn bị PPT. HS đọc trước bài.`;

    function App() {
      const [contextStructure, setContextStructure] = useState(defaultStructure);
      const [contextSample, setContextSample] = useState(defaultSample);
      const [contextTextbook, setContextTextbook] = useState('');
      const [userApiKey, setUserApiKey] = useState('');
      const [messages, setMessages] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      
      const chatEndRef = useRef(null);
      
      const structureInputRef = useRef(null);
      const sampleInputRef = useRef(null);
      const textbookInputRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isLoading]);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 4000);
      };

      const fileToBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
      });

      const handleExportWord = (htmlString, index) => {
        let processedHtml = htmlString
          .replace(/<td(.*?)>/gi, '<td$1><p>')
          .replace(/<\/td>/gi, '</p></td>')
          .replace(/<th(.*?)>/gi, '<th$1><p>')
          .replace(/<\/th>/gi, '</p></th>')
          .replace(/<br\s*\/?>/gi, '</p><p>');

        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title>Giáo Án</title>
        <style>
          @page { size: A4; margin: 2cm; }
          body { font-family: 'Times New Roman', serif; font-size: 14pt; text-align: justify; }
          table { border-collapse: collapse; width: 100%; margin-bottom: 15pt; }
          th, td { border: 1px solid black; padding: 8pt; vertical-align: top; text-align: justify; }
          th { font-weight: bold; text-align: center; }
          p { margin: 0 0 6pt 0; text-align: justify; line-height: 1.3; }
        </style>
        </head><body>`;
        const footer = "</body></html>";
        const sourceHTML = header + processedHtml + footer;
        
        const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
        const fileDownload = document.createElement("a");
        document.body.appendChild(fileDownload);
        fileDownload.href = source;
        fileDownload.download = `Giao_An_AI_${index}.doc`;
        fileDownload.click();
        document.body.removeChild(fileDownload);
        
        showToast('✅ Đã tải file Word về máy!');
      };

      const handleCopy = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        textArea.style.top = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          const successful = document.execCommand('copy');
          if (successful) showToast('✅ Đã sao chép thành công!');
        } catch (err) {
          showToast('❌ Trình duyệt chặn sao chép.');
        }
        document.body.removeChild(textArea);
      };

      const handleFileUpload = async (event, setterFunc, isAppendMode = false) => {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;
        
        setIsLoading(true);
        const activeApiKey = userApiKey.trim();
        let successCount = 0;
        let failCount = 0;
        let lastError = "";

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const fileType = file.type;

          const processingMsg = `\n\n[HỆ THỐNG ĐANG XỬ LÝ: ${file.name}... VUI LÒNG ĐỢI]`;
          setterFunc(prev => isAppendMode ? prev + processingMsg : processingMsg);
          showToast(`⏳ Đang xử lý tệp ${i + 1}/${files.length}: ${file.name}...`);

          try {
            if (file.name.endsWith('.docx')) {
              const arrayBuffer = await file.arrayBuffer();
              const result = await mammoth.extractRawText({ arrayBuffer });
              setterFunc(prev => {
                const clean = prev.replace(processingMsg, '');
                return isAppendMode ? clean + (clean ? "\n\n" : "") + result.value : result.value;
              });
              successCount++;
            } else if (fileType.startsWith('image/') || fileType === 'application/pdf') {
              
              const base64Data = await fileToBase64(file);
              
              // XỬ LÝ ĐỊNH TUYẾN MODEL THÔNG MINH
              // Nếu nhập key (chạy trên Blogger) thì dùng model công khai 2.5-flash.
              // Nếu bỏ trống key (chạy trong Canvas) thì để Canvas tự cấp proxy model preview.
              const requestModel = activeApiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
              const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${requestModel}:generateContent?key=${activeApiKey}`;
              
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [
                      { text: "Hãy trích xuất nguyên văn văn bản từ tài liệu này. Luôn dùng gạch ngang dài (—) để đánh dấu lời của nhân vật. Các chú thích in đậm và để trong cặp dấu ngoặc đơn (ví dụ (1)), chú thích đặt ở cuối truyện. Tuyệt đối không thêm bình luận nào khác ngoài văn bản." },
                      { inlineData: { mimeType: fileType, data: base64Data } }
                    ]
                  }]
                })
              });
              
              const data = await response.json();
              
              if (!response.ok) {
                 // Bắt lỗi cụ thể nếu thiếu API Key khi dùng trên Blogger
                 if (response.status === 400 || (data.error && data.error.message.includes("API key"))) {
                     throw new Error("Vui lòng nhập API Key hợp lệ ở Bảng điều khiển!");
                 }
                 throw new Error(data.error?.message || "Lỗi xử lý API");
              }
              
              if (data.candidates && data.candidates[0].content) {
                  const text = data.candidates[0].content.parts[0].text;
                  setterFunc(prev => {
                    const clean = prev.replace(processingMsg, '');
                    return isAppendMode ? clean + (clean ? `\n\n--- Hết trang trước, chuyển trang tiếp theo ---\n\n` : "") + text : text;
                  });
                  successCount++;
              } else {
                  throw new Error("Nội dung phản hồi trống.");
              }
            } else if (file.name.endsWith('.txt')) {
              const text = await file.text();
              setterFunc(prev => {
                const clean = prev.replace(processingMsg, '');
                return isAppendMode ? clean + (clean ? "\n\n" : "") + text : text;
              });
              successCount++;
            } else {
              throw new Error("Định dạng tệp không được hỗ trợ.");
            }
          } catch (err) {
            console.error("Lỗi xử lý file:", err);
            lastError = err.message;
            setterFunc(prev => prev.replace(processingMsg, `\n\n[❌ LỖI XỬ LÝ FILE: ${file.name}]`));
            failCount++;
          }
        }
        
        setIsLoading(false);
        event.target.value = '';

        if (failCount > 0) {
          showToast(`⚠️ Lỗi ${failCount} tệp: ${lastError}`);
        } else if (successCount > 0) {
          showToast(`✅ Đã trích xuất xong ${successCount} tệp!`);
        }
      };

      const handleSendMessage = async () => {
        if (!inputValue.trim()) return;
        const activeApiKey = userApiKey.trim();

        setMessages(prev => [...prev, { role: 'user', text: inputValue }]);
        setInputValue('');
        setIsLoading(true);

        const systemInstructionText = `Bạn là chuyên gia sư phạm. Soạn giáo án chi tiết dựa vào SGK, Cấu trúc Framework và Dữ liệu mẫu. 
Luôn dùng gạch ngang dài (—) cho lời thoại. Chú thích in đậm trong ngoặc đơn ở cuối bài. Mọi bảng biểu chỉ dùng mã HTML <br> để xuống dòng bên trong ô, tuyệt đối không ấn enter.
BẮT BUỘC: Toàn bộ phần "D. TIẾN TRÌNH DẠY HỌC" (hoặc các hoạt động dạy học) phải được kẻ BẢNG (table) rõ ràng, tuyệt đối không viết dạng văn bản thường ngoài bảng.

[CẤU TRÚC BẮT BUỘC]
${contextStructure}

[DỮ LIỆU MẪU]
${contextSample}

[NỘI DUNG SÁCH GIÁO KHOA]
${contextTextbook}`;

        const requestModel = activeApiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${requestModel}:generateContent?key=${activeApiKey}`;

        try {
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: inputValue }] }],
              systemInstruction: { parts: [{ text: systemInstructionText }] }
            })
          });
          const data = await response.json();
          
          if (!response.ok) {
             if (response.status === 400 || (data.error && data.error.message.includes("API key"))) {
                 throw new Error("Vui lòng nhập API Key hợp lệ ở Bảng điều khiển!");
             }
             throw new Error(data.error?.message || "Lỗi xử lý API");
          }
          
          if (data.candidates && data.candidates[0].content) {
              setMessages(prev => [...prev, { role: 'model', text: data.candidates[0].content.parts[0].text }]);
          }
        } catch (err) {
          showToast("❌ " + err.message);
        }
        setIsLoading(false);
      };

      return (
        <React.Fragment>
          <div className="ai-lp-header">
            <h1>TRỢ LÝ SOẠN GIÁO ÁN THỰC HÀNH TIẾNG VIỆT</h1>
            <div className="ai-lp-subtitle">Hỗ trợ soạn giáo án dựa trên dữ liệu SGK, giáo án mẫu và cấu trúc framework (theo định hướng phát triển năng lực phẩm chất học sinh).</div>
            <div className="ai-lp-features-note">Tính năng mới: Hỗ trợ Tải file word/image/pdf quét trực tiếp nội dung bằng AI.</div>
            <button className="ai-lp-fullscreen-btn" onClick={() => document.getElementById('ai-lesson-planner-wrapper').requestFullscreen()}>
              🔳 TOÀN MÀN HÌNH
            </button>
          </div>

          <div className="ai-lp-main-container">
            <div className="ai-lp-config-panel">
              <h2>1. BẢNG ĐIỀU KHIỂN</h2>
              <div className="ai-lp-input-group">
                <div className="ai-lp-label-header">
                  <label>MÃ KHÓA API (GEMINI)</label>
                </div>
                <input type="password" value={userApiKey} onChange={(e)=>setUserApiKey(e.target.value)} placeholder="Nhập Key từ Google Studio..." />
              </div>

              <div className="ai-lp-input-group">
                <div className="ai-lp-label-header">
                  <label>CẤU TRÚC FRAMEWORK</label>
                  <label className="ai-lp-upload-btn" onClick={() => structureInputRef.current.click()}>📁 NHẬP FILE</label>
                </div>
                <input type="file" ref={structureInputRef} style={{display: 'none'}} accept=".txt,.docx" onChange={(e) => handleFileUpload(e, setContextStructure, false)} />
                <textarea style={{height: '100px'}} value={contextStructure} onChange={(e)=>setContextStructure(e.target.value)} />
              </div>

              <div className="ai-lp-input-group">
                <div className="ai-lp-label-header">
                  <label>DỮ LIỆU HUẤN LUYỆN</label>
                  <label className="ai-lp-upload-btn" onClick={() => sampleInputRef.current.click()}>📁 NHẬP FILE</label>
                </div>
                <input type="file" ref={sampleInputRef} style={{display: 'none'}} accept=".txt,.docx" onChange={(e) => handleFileUpload(e, setContextSample, false)} />
                <textarea style={{height: '100px'}} value={contextSample} onChange={(e)=>setContextSample(e.target.value)} />
              </div>

              <div className="ai-lp-input-group">
                <div className="ai-lp-label-header">
                  <label>NGUỒN SÁCH GIÁO KHOA</label>
                  <label className="ai-lp-upload-btn" onClick={() => textbookInputRef.current.click()}>📷 TẢI ẢNH/PDF</label>
                </div>
                <input type="file" ref={textbookInputRef} multiple style={{display: 'none'}} accept=".docx,.pdf,image/*,.txt" onChange={(e) => handleFileUpload(e, setContextTextbook, true)} />
                <textarea style={{height: '150px'}} value={contextTextbook} onChange={(e)=>setContextTextbook(e.target.value)} placeholder="Dán nội dung hoặc tải tệp bằng nút bên trên..." />
              </div>

              <button className="ai-lp-btn-start" onClick={() => setInputValue("Dựa vào thông tin đã cung cấp, hãy soạn một giáo án hoàn chỉnh.") || handleSendMessage()} disabled={isLoading}>
                🚀 BẮT ĐẦU SOẠN THẢO
              </button>
            </div>

            <div className="ai-lp-chat-panel">
              <div className="ai-lp-chat-history">
                {messages.length === 0 && (
                  <div style={{margin: 'auto', textAlign: 'center', opacity: 0.5}}>
                    <div style={{fontSize: '3.5rem', marginBottom: '15px'}}>👨‍🏫</div>
                    Sẵn sàng soạn thảo giáo án. Thầy hãy nhập yêu cầu bên dưới.
                  </div>
                )}
                {messages.map((m, i) => (
                  <div key={i} className={`ai-lp-message ${m.role}`}>
                    <div className="ai-lp-message-content" dangerouslySetInnerHTML={{ __html: m.role === 'model' ? marked.parse(m.text) : m.text }}></div>
                    {m.role === 'model' && (
                      <div className="ai-lp-msg-actions">
                        <button className="ai-lp-action-btn" onClick={() => handleCopy(m.text)}>Sao chép giáo án</button>
                        <button className="ai-lp-action-btn" onClick={() => handleExportWord(marked.parse(m.text), i)}>Tải file Word</button>
                      </div>
                    )}
                  </div>
                ))}
                {isLoading && <div style={{color: 'var(--accent-primary)', fontSize: '0.85rem'}}>AI đang soạn thảo giáo án chi tiết...</div>}
                <div ref={chatEndRef} />
              </div>
              <div className="ai-lp-chat-input-container">
                <div className="ai-lp-chat-input-wrapper">
                  <input value={inputValue} onChange={(e)=>setInputValue(e.target.value)} onKeyDown={(e)=>e.key==='Enter'&&handleSendMessage()} placeholder="Thầy muốn soạn hoạt động nào trong SGK?" />
                  <button className="ai-lp-btn-start" style={{width: '100px', marginTop: 0}} onClick={handleSendMessage}>GỬI</button>
                </div>
              </div>
            </div>
          </div>
          {toastMsg && <div className="ai-lp-toast">{toastMsg}</div>}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('ai-lp-root'));
    root.render(<App />);
  </script>
</div>
